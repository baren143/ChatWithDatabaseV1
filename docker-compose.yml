version: '3.8'

services:
  db:
    image: ankane/pgvector:v0.5.1  # Special image that comes with pgvector pre-installed!
    container_name: saas_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-chat_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: saas_redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: saas_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-chat_db}
      - REDIS_URL=redis://redis:6379/0
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - SECRET_KEY=${SECRET_KEY}
      - MOCK_EMBEDDINGS=${MOCK_EMBEDDINGS:-true}
    volumes:
      - ./backend:/app
    command: uvicorn main:app --reload --host 0.0.0.0 --port 8000
    depends_on:
      - redis
      - db

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: saas_worker
    restart: always
    environment:
      - DATABASE_URL=postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-chat_db}
      - REDIS_URL=redis://redis:6379/0
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - SECRET_KEY=${SECRET_KEY}
      - MOCK_EMBEDDINGS=${MOCK_EMBEDDINGS:-true}
    volumes:
      - ./backend:/app
    command: celery -A celery_app worker --loglevel=info
    depends_on:
      - redis
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: saas_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://187.127.178.25:8000
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend

volumes:
  postgres_data: