version: '3.8'

services:
  # PostgreSQL with pgvector support
  db:
    image: ankane/pgvector:v0.5.1
    container_name: saas_postgres_prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-chat_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Do NOT expose to public internet - only internal network
    networks:
      - saas_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for Celery task queue
  redis:
    image: redis:7-alpine
    container_name: saas_redis_prod
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    # Do NOT expose to public internet - only internal network
    networks:
      - saas_network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: saas_backend_prod
    restart: always
    environment:
      - DATABASE_URL=postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-chat_db}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - ENVIRONMENT=production
    expose:
      - "8000"  # Exposed only to internal network
    ports:
      - "8000:8000"  # Change to internal only or use reverse proxy
    volumes:
      - uploads_data:/app/uploads
    networks:
      - saas_network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 4
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Celery Worker
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: saas_worker_prod
    restart: always
    environment:
      - DATABASE_URL=postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-chat_db}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - ENVIRONMENT=production
    volumes:
      - uploads_data:/app/uploads
    networks:
      - saas_network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A celery_app worker --loglevel=info --concurrency=4

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    container_name: saas_frontend_prod
    restart: always
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    expose:
      - "3000"
    ports:
      - "3000:3000"
    networks:
      - saas_network
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  saas_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local
